name: grow today's tree

on:
  schedule:
    - cron: "0 12 * * *"  # daily at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: grow the tree
        run: python art/grow.py

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add art/tree.svg
          git diff --cached --quiet && echo "no change" || git commit -m "grow today's tree"
          git push
